# ============================================================
# gpu_vulkan_blocklist.cfg
# Vulkan Extension Blocklist — Vendor15 GPU Stability
# ============================================================
#
# Extensions listed here are known to cause crashes, SIGSEGV,
# SIGABRT, or undefined behavior on Android 15 vendor GPU
# drivers when running under an Android 16 GSI.
#
# Format: one extension name per line.
#   - Lines starting with '#' are comments.
#   - Empty lines are ignored.
#   - Extension names must match exactly (case-sensitive).
#
# The gpu_stability.sh script reads this file and sets
# debug.vulkan.disabled.extensions accordingly.
#
# Principle: if unsure whether an extension is safe, block it.
# ============================================================

# --- DMA-buf interop ---
# Causes SIGSEGV on vendors with broken DRM/KMS integration.
# The dma_buf import path often hits unmapped memory when the
# vendor kernel driver doesn't fully support prime handles.
VK_EXT_external_memory_dma_buf
VK_EXT_image_drm_format_modifier

# --- Ray tracing ---
# Not supportable on any Android 15 vendor shipping driver.
# Advertising these causes apps to attempt ray tracing init
# which always fails with SIGABRT on pipeline creation.
VK_KHR_ray_tracing_pipeline
VK_KHR_ray_query
VK_KHR_acceleration_structure
VK_KHR_deferred_host_operations

# --- Device fault reporting ---
# Crashes on Mali G-series (Valhall) when the driver returns
# incomplete fault info structures with garbage pointers.
VK_EXT_device_fault

# --- Custom border color ---
# Broken on Adreno 6xx vendor BSPs (VNDK 33 and below).
# Returns VK_ERROR_DEVICE_LOST during sampler creation.
VK_EXT_custom_border_color

# --- Extended dynamic state 3 ---
# ABI mismatch on VNDK 33->34 upgrade path. The vendor driver
# exposes the extension but the function pointers are stale,
# causing SIGSEGV on any vkCmdSet* call.
VK_EXT_extended_dynamic_state3

# --- Shader object ---
# Crashes on PowerVR and some Mali implementations.
# The vendor driver accepts shader object creation but
# SIGABRT on vkCmdBindShadersEXT with invalid internal state.
VK_EXT_shader_object

# --- Huawei vendor extensions ---
# Only functional on HiSilicon Kirin with matching ROM.
# On other vendors or GSI, these dereference NULL vendor
# dispatch tables causing immediate SIGSEGV.
VK_HUAWEI_subpass_shading
VK_HUAWEI_invocation_mask
VK_HUAWEI_cluster_culling_shader

# --- Graphics pipeline libraries ---
# Exposes incomplete pipeline cache implementations on
# older Adreno and Mali drivers, causing random SIGABRT
# during pipeline compilation.
VK_EXT_graphics_pipeline_library

# --- Mesh shading ---
# Advertised by some drivers but not functionally implemented.
# Dispatch calls hit stub functions that abort.
VK_EXT_mesh_shader

# --- Descriptor buffer ---
# Requires precise buffer layout that vendor drivers often
# get wrong, leading to GPU hangs and watchdog resets.
VK_EXT_descriptor_buffer

# --- Multi-draw ---
# Some vendor implementations have off-by-one in draw count
# validation, causing buffer overflows on the GPU.
VK_EXT_multi_draw

# --- Mutable descriptor type ---
# Broken on Adreno with VNDK ≤33. Descriptor pool allocation
# returns success but the descriptors are silently corrupt.
VK_EXT_mutable_descriptor_type
VK_VALVE_mutable_descriptor_type
